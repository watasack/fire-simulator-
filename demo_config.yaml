# 児童手当設定
child_allowance:
  enabled: true
  first_child_under_3: 15000
  second_child_plus_under_3: 20000
  age_3_to_high_school: 10000

# 住宅ローン設定（一般的な想定値）
mortgage:
  enabled: true
  monthly_payment: 100000      # 一般的な住宅ローン月額（円）
  end_date: '2060/12/31'       # 35年ローン想定

# 住宅メンテナンス費用設定
house_maintenance:
  enabled: true
  items:
    - name: '白アリ対策'
      cost: 150000
      frequency_years: 10
      first_year: 2035
    - name: '外壁補修'
      cost: 3000000
      frequency_years: 30
      first_year: 2055

# 年金設定（一般的なサラリーマン世帯の想定値）
pension:
  enabled: true
  start_age: 65

  people:
    - name: '夫'
      birthdate: '1990/01/01'
      pension_type: 'employee'
      work_start_age: 22
      avg_monthly_salary: 500000       # 標準報酬月額（円）
      past_pension_base_annual: 150000 # 老齢厚生年金実績額（円/年）
      past_contribution_months: 160    # これまでの加入月数
      override_start_age: 70
    - name: '妻'
      birthdate: '1991/01/01'
      pension_type: 'national'
      override_start_age: 65

# 社会保険料設定
social_insurance:
  enabled: true
  national_pension_monthly_premium: 16980
  health_insurance_income_rate: 0.11
  health_insurance_per_person: 50000
  health_insurance_per_household: 30000
  health_insurance_members: 2
  health_insurance_basic_deduction: 430000
  health_insurance_max_premium: 1060000

# ワーケーション費用設定
workation:
  enabled: true
  start_child_index: 1
  start_child_age: 18
  annual_cost: 0

# 資産配分設定
asset_allocation:
  enabled: true
  cash_buffer_months: 6
  auto_invest_threshold: 1.5
  nisa_enabled: true
  nisa_annual_limit: 3600000
  invest_beyond_nisa: true
  min_cash_balance: 5000000
  capital_gains_tax_rate: 0.20315

# FIRE後の現金管理戦略
post_fire_cash_strategy:
  enabled: true
  safety_margin: 1000000
  target_cash_reserve: 3000000
  monthly_buffer_months: 1
  market_crash_threshold: -0.2
  recovery_threshold: -0.15
  emergency_cash_floor: 100000

# 年金繰り下げ受給戦略
pension_deferral:
  enabled: true
  defer_to_70_threshold: 1.50
  defer_to_68_threshold: 1.20
  early_at_62_threshold: 0.50
  deferral_increase_rate: 0.084
  early_decrease_rate: 0.048
  min_start_age: 62
  max_start_age: 75

# 最適化設定
optimization:
  pre_pension_reduction_rate: 0.3
  min_asset_floor: 3_000_000
  austerity_years_before_pension: 10
  pre_pension_reduction_candidates: [0, 0.10, 0.20, 0.30]

# 可視化設定
visualization:
  font_family: "'Segoe UI', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif"

# 出力設定
output:
  html_file: 'dashboard/index.html'
