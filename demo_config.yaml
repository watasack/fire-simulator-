# FIRE Dashboard Configuration (デモアプリ用・匿名化済み)
# このファイルはデモアプリ専用の設定です。
# 個人情報は含まれておらず、一般的な共働き子育て世帯を想定した設定です。

# データソース設定（デモでは未使用）
data:
  encoding: 'utf-8'
  asset_file: 'data/資産推移月次.csv'
  transaction_pattern: 'data/収入・支出詳細_*.csv'

  income_forecast:
    include_keywords:
      - '給与'
      - '給料'
    exclude_keywords:
      - '財形'
      - '配当'
      - 'ポイント'
      - '還付'

# シミュレーション設定
simulation:
  years: 50                    # シミュレーション期間（年）
  start_age: 35                # 現在の年齢（デモアプリが上書き）
  life_expectancy: 90          # 想定寿命

  # 労働収入（デモアプリが shuhei_income=0, sakura_income=0 に上書きし monthly_income に委譲）
  shuhei_income: 500000        # 夫の手取り月額（円）: 共働き世帯の一般的想定値
  sakura_income: 400000        # 妻の手取り月額（円）: 共働き世帯の一般的想定値
  initial_labor_income: 900000 # 世帯手取り合計

  # FIRE後副収入（月額・円）
  shuhei_post_fire_income: 100000   # 夫のFIRE後副収入
  sakura_post_fire_income: 100000   # 妻のFIRE後副収入

  # 産休・育休（デモアプリが [] に上書き）
  maternity_leave:
    - child: '子B'
      months_before: 2
      months_after: 12
      monthly_income: 0

  # 育休（デモアプリが [] に上書き）
  shuhei_parental_leave:
    - child: '子B'
      months_after: 12
      monthly_income: 310000
      monthly_income_after_180days: 231000

  # 時短勤務（デモアプリが [] に上書き）
  shuhei_reduced_hours:
    - child: '子B'
      start_months_after: 12
      end_months_after: 36
      income_ratio: 0.75

  # 標準シナリオ
  standard:
    annual_return_rate: 0.05   # 年率リターン 5%
    inflation_rate: 0.02       # インフレ率 2%
    income_growth_rate: 0.02   # 収入成長率 2%
    expense_growth_rate: 0.02  # 支出成長率 2%
    pension_growth_rate: 0.01  # 年金成長率 1%

  # モンテカルロシミュレーション設定
  monte_carlo:
    enabled: true
    iterations: 1000
    return_std_dev: 0.06
    mean_reversion_speed: 0.3
    enhanced_model:
      enabled: true
      garch_omega: 0.000025
      garch_alpha: 0.35
      garch_beta: 0.60
      volatility_floor: 0.008
      volatility_ceiling: 0.040
      mean_reversion_window: 12
      mr_speed_crash: 0.08
      mr_speed_normal: 0.15
      mr_speed_bubble: 0.06
      crash_threshold: -0.15
      bubble_threshold: 0.15

